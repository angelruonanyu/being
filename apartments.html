<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EE;
    --ink: #3D4A3E;
    --ink-light: #6B6860;
    --ink-faint: #B5B2AA;
    --green: #2D5A3D;
    --green-light: #EAF2EC;
    --green-mid: #C5DEC9;
    --amber: #C4782A;
    --amber-light: #FBF1E6;
    --border: #E2DED6;
    --white: #FFFFFF;
    --radius: 12px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: #4A6741;
    color: var(--cream);
    padding: 2.5rem 3rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 2rem; line-height: 1.15; }
  .header-title em { font-style: italic; color: var(--green-mid); }
  .header-sub { font-size: 13px; color: rgba(247,244,238,0.5); margin-top: 6px; letter-spacing: 0.04em; }

  /* Date controls */
  .date-controls {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap;
    margin-top: 1.5rem;
  }
  .date-group { display: flex; flex-direction: column; gap: 4px; }
  .date-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(247,244,238,0.45); }
  .date-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.25);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 4px 0;
    cursor: pointer;
    outline: none;
    width: 140px;
  }
  .date-input:focus { border-bottom-color: var(--green-mid); }
  .date-sep { color: rgba(247,244,238,0.3); font-size: 18px; margin-top: 18px; }
  .nights-display { display: flex; flex-direction: column; gap: 4px; margin-left: auto; text-align: right; }
  .nights-num { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--green-mid); line-height: 1; }
  .nights-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(247,244,238,0.45); }

  /* Main grid */
  .main { padding: 2rem 3rem 4rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
    display: flex; flex-direction: column;
  }
  .card:hover { box-shadow: 0 8px 32px rgba(28,27,24,0.1); transform: translateY(-2px); }

  .card-top {
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .card-num {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 4px;
  }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; line-height: 1.25; color: var(--ink); }
  .card-addr { font-size: 12px; color: var(--ink-light); margin-top: 3px; }
  .pw-badge {
    background: var(--green-light);
    color: var(--green);
    font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }

  .card-price {
    padding: 1rem 1.25rem;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 10px;
  }
  .total-price {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem; color: var(--ink);
  }
  .price-meta { font-size: 12px; color: var(--ink-light); }
  .daily-rate { font-size: 12px; color: var(--ink-faint); margin-left: auto; }

  .card-body { padding: 1rem 1.25rem; flex: 1; }

  .section-label {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint); margin: 12px 0 7px;
  }
  .section-label:first-child { margin-top: 0; }

  .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .pill {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px; color: var(--ink-light);
    padding: 3px 8px;
  }
  .pill.key { background: var(--amber-light); border-color: #E8C898; color: var(--amber); font-weight: 500; }
  .pill.reserved { background: #EAF2EC; border-color: var(--green-mid); color: var(--green); font-weight: 500; }

  .area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .area-item { background: var(--cream); border-radius: var(--radius-sm); padding: 6px 8px; }
  .area-lbl { font-size: 10px; color: var(--ink-faint); margin-bottom: 2px; }
  .area-val { font-size: 13px; font-weight: 500; color: var(--ink); }
  .area-item.span2 { grid-column: span 2; background: var(--green-light); }
  .area-item.span2 .area-lbl { color: var(--green); }
  .area-item.span2 .area-val { color: var(--green); }

  .dist-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .dist-item { background: var(--cream); border-radius: var(--radius-sm); padding: 6px 8px; text-align: center; }
  .dist-lbl { font-size: 9px; color: var(--ink-faint); margin-bottom: 2px; line-height: 1.3; }
  .dist-val { font-size: 13px; font-weight: 500; color: var(--ink); }
  .dist-val.tbd { color: var(--ink-faint); font-style: italic; font-weight: 400; font-size: 11px; }

  .card-footer {
    padding: 0.75rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .tag { font-size: 11px; color: var(--ink-light); background: var(--cream); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; }
  .link-btn {
    font-size: 12px; color: var(--green); text-decoration: none;
    border: 1px solid var(--green-mid); border-radius: 4px;
    padding: 4px 10px; white-space: nowrap; flex-shrink: 0;
    transition: background 0.15s;
  }
  .link-btn:hover { background: var(--green-light); }
  .no-link { font-size: 11px; color: var(--ink-faint); font-style: italic; }

  /* Summary bar */
  .summary {
    background: #4A6741;
    color: var(--cream);
    padding: 1rem 3rem;
    display: flex; gap: 2rem; align-items: center; flex-wrap: wrap;
  }
  .sum-item { display: flex; flex-direction: column; gap: 2px; }
  .sum-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(247,244,238,0.4); }
  .sum-val { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--cream); }
  .sum-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.1); }

  @media (max-width: 600px) {
    .header { padding: 1.5rem; }
    .main { padding: 1rem 1rem 3rem; }
    .summary { padding: 1rem 1.5rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>

      { label: '客厅', val: '沙发床 + 气垫床' },
      { label: '厨房', val: '独立厨房' },
      { label: '卧室 1', val: '单人床' },
      { label: '卧室 2', val: 'Queen床' },
    ],
    dist: { cluny: '约 16 分钟', cromwell: '约 17 分钟', lillie: '约 15 分钟' },
    tags: ['Superhost', '评分 4.95', 'Guest Favourite', '允许宠物', '免费取消至4月19日'],
    link: 'https://www.airbnb.co.uk/rooms/675453246981052994',
  },
];

const AIRBNB_FEE = 0.082;

function dailyRate(pw) {
  return pw * 52 / 365;
}

function totalPrice(pw, days) {
  return dailyRate(pw) * days;
}

function fmt(n) {
  return '£' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function getDays() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  if (!s || !e) return 0;
  const diff = (new Date(e) - new Date(s)) / (1000 * 60 * 60 * 24);
  return Math.max(0, Math.round(diff));
}

function renderCards(days) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  const totals = [];

  apartments.forEach(apt => {
    const dr = apt.pw ? dailyRate(apt.pw) : null;
    const baseTotal = apt.fixedTotal ? apt.fixedTotal : totalPrice(apt.pw, days);
    const total = apt.source === 'airbnb' ? baseTotal * (1 + AIRBNB_FEE) : baseTotal;
    totals.push({ total, dr });

    const pwDisplay = apt.pw ? `£${apt.pw.toLocaleString()} pw` : 'Airbnb';
    const dailyDisplay = dr ? fmt(dr) + '/天' : `${fmt(total / days)}/晚（均摊）`;
    const sourceLabel = apt.source === 'airbnb' ? 'Airbnb' : 'Foxtons';
    const sourceBg = apt.source === 'airbnb' ? '#FFF0E6' : '#E6F0FF';
    const sourceColor = apt.source === 'airbnb' ? '#B34A00' : '#1A4FA0';
    const priceNote = apt.source === 'airbnb'
      ? `${days} 天总价（含 ~8.2% 服务费）`
      : `${days} 天总价`;

    const areaDisplay = apt.totalArea ? `${apt.totalArea} m²` : null;

    const filteredRooms = apt.rooms.filter(r =>
      r.val && r.val !== '待确认' && r.val !== '未披露'
    );

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-num">公寓 #${apt.num} <span style="font-size:10px; padding:2px 7px; border-radius:4px; background:${sourceBg}; color:${sourceColor}; font-weight:500; letter-spacing:0.03em;">${sourceLabel}</span></div>
          <div class="card-title">${apt.title}</div>
          <div class="card-addr">${apt.addr}</div>
        </div>
        <div class="pw-badge">${pwDisplay}</div>
      </div>
      <div class="card-price">
        <div class="total-price">${fmt(total)}</div>
        <div class="price-meta">${priceNote}</div>
        <div class="daily-rate">${dailyDisplay}</div>
      </div>
      <div class="card-body">
        <div class="section-label">基本信息</div>
        <div class="pill-row">
          ${apt.floor && apt.floor !== '待确认' ? `<span class="pill">${apt.floor}</span>` : ''}
          <span class="pill">${apt.beds}卧 ${apt.baths}卫</span>
          <span class="pill">可住 ${apt.maxGuests || apt.beds * 2} 人</span>
          ${apt.hasLift ? '<span class="pill">有电梯</span>' : ''}
          ${apt.reserved ? '<span class="pill reserved">' + apt.reserved + '</span>' : ''}
        </div>

        <div class="section-label">空间面积</div>
        <div class="area-grid">
          ${areaDisplay ? `<div class="area-item span2"><div class="area-lbl">总面积</div><div class="area-val">${areaDisplay}</div></div>` : ''}
          ${filteredRooms.map(r => `
            <div class="area-item">
              <div class="area-lbl">${r.label}</div>
              <div class="area-val">${r.val}</div>
            </div>
          `).join('')}
        </div>

        <div class="section-label">步行距离</div>
        <div class="dist-grid">
          <div class="dist-item">
            <div class="dist-lbl">6号</div>
            <div class="dist-val">${apt.dist.cluny}</div>
          </div>
          <div class="dist-item">
            <div class="dist-lbl">233</div>
            <div class="dist-val">${apt.dist.cromwell}</div>
          </div>
          <div class="dist-item">
            <div class="dist-lbl">Lillie Square</div>
            <div class="dist-val">${apt.dist.lillie}</div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div class="tags">
          ${apt.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        ${apt.link
          ? `<a href="${apt.link}" target="_blank" class="link-btn">查看房源 →</a>`
          : `<span class="no-link">链接待补充</span>`}
      </div>
    `;
    grid.appendChild(card);
  });

  document.getElementById('nightsCount').textContent = days;
}

function update() {
  const days = getDays();
  renderCards(days);
}

document.getElementById('startDate').addEventListener('change', update);
document.getElementById('endDate').addEventListener('change', update);

update();
</script>
</body>
</html>
