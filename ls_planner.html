<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lillie Square 工作室功能分区规划</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;font-size:14px;color:#1a1a1a;background:#f9f9f7;padding:16px;}
.app{max-width:900px;margin:0 auto;padding:1rem 0;}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:8px;flex-wrap:wrap;}
.btn{background:none;border:0.5px solid #ccc;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:#1a1a1a;transition:background 0.15s;}
.btn:hover{background:#f0f0ee;}
.btn-primary{background:#e8f0fe;color:#1a56db;border-color:#a4cafe;}
.btn-primary:hover{opacity:0.85;}
.editable{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s;display:inline;}
.editable:hover{border-bottom-color:#ccc;}
.inline-input{background:none;border:none;border-bottom:1px solid #aaa;outline:none;color:inherit;font:inherit;padding:0 2px;}
.hint{font-size:11px;color:#aaa;margin-left:6px;}
.apts{display:flex;flex-direction:column;gap:1.5rem;}
.apt-section{border:0.5px solid #ddd;border-radius:12px;overflow:hidden;background:#fff;}
.apt-header{padding:12px 14px;background:#f5f5f3;border-bottom:0.5px solid #ddd;display:flex;align-items:flex-start;gap:10px;}
.apt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.apt-header-info{flex:1;min-width:0;}
.apt-name-line{font-size:14px;font-weight:500;margin-bottom:3px;}
.apt-meta-line{font-size:12px;color:#666;display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.apt-body{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.zone-card{border:0.5px solid #ddd;border-radius:12px;padding:12px;background:#fff;cursor:pointer;transition:border-color 0.15s;}
.zone-card:hover{border-color:#aaa;}
.zone-card.active{border:1px solid #1a56db;}
.zone-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.zone-name{font-size:13px;font-weight:500;}
.zone-status{font-size:11px;padding:2px 7px;border-radius:20px;}
.status-confirmed{background:#dcfce7;color:#166534;}
.status-planning{background:#fef9c3;color:#854d0e;}
.status-pending{background:#e8f0fe;color:#1e40af;}
.status-paused{background:#f3f4f6;color:#6b7280;}
.zone-items{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.zone-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:#f3f4f6;color:#555;}
.zone-mode-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.mode-tag{font-size:10px;padding:1px 6px;border-radius:20px;}
.mode-daily{background:#E1F5EE;color:#0F6E56;}
.mode-event{background:#FAEEDA;color:#854F0B;}
.zone-notes{font-size:11px;color:#888;font-style:italic;}
.add-zone-btn{border:1px dashed #ccc;border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#888;cursor:pointer;min-height:80px;background:none;width:100%;transition:border-color 0.15s,color 0.15s;}
.add-zone-btn:hover{border-color:#1a56db;color:#1a56db;}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.22);display:flex;align-items:flex-start;justify-content:center;padding-top:30px;z-index:100;}
.modal{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.25rem;width:360px;max-width:95vw;max-height:80vh;overflow-y:auto;}
.modal h3{font-size:14px;font-weight:500;margin-bottom:1rem;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:12px;color:#666;margin-bottom:3px;}
.field input,.field select,.field textarea{width:100%;padding:6px 9px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit;}
.field textarea{resize:vertical;min-height:54px;}
.tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.tag-chip{font-size:11px;padding:2px 8px;border-radius:20px;background:#f3f4f6;color:#555;display:flex;align-items:center;gap:3px;}
.tag-remove{cursor:pointer;color:#aaa;font-size:13px;line-height:1;}
.tag-remove:hover{color:#e53e3e;}
.add-tag-row{display:flex;gap:6px;}
.add-tag-row input{flex:1;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;border-top:0.5px solid #eee;padding-top:11px;}
.btn-danger{color:#e53e3e;border-color:#fed7d7;}
.btn-danger:hover{background:#fff5f5;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.stat-card{background:#f5f5f3;border-radius:8px;padding:12px 14px;}
.stat-card .num{font-size:24px;font-weight:500;}
.stat-card .lbl{font-size:12px;color:#666;margin-top:2px;}
.report-apt{margin-bottom:1.75rem;}
.report-apt-header{padding:10px 14px;border-radius:8px;margin-bottom:10px;}
.report-zone{border:0.5px solid #ddd;border-radius:12px;padding:12px 14px;margin-bottom:8px;background:#fff;}
.report-zone-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.report-zone-name{font-size:13px;font-weight:500;}
.report-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.report-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:#f3f4f6;color:#555;}
.report-notes{font-size:12px;color:#888;font-style:italic;margin-top:7px;padding-top:7px;border-top:0.5px solid #eee;}
.report-mode-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.priority-high{color:#E24B4A;}
.priority-medium{color:#BA7517;}
.priority-low{color:#3B6D11;}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script>
const SK='lillie-sq-v4';
const COLORS=['#7F77DD','#1D9E75','#D85A30'];
const DEFAULT={title:'Lillie Square 工作室功能分区规划',subtitle:'三套公寓 · Earls Court / Kensington',updatedAt:new Date().toLocaleDateString('zh-CN'),apts:[{id:1,name:'公寓一 · 女生宿舍 + 烘焙工作室',colorIdx:0,unit:'7LS-303（备选 2BG-G04，5月初搬家）',layout:'2.5B 2B · 可住6位',zones:[{id:101,name:'女生宿舍',status:'confirmed',priority:'high',items:['双人床×2','上下床×1','可住6位'],modes:['日常','恭迎'],notes:'两个沙发可午休'},{id:102,name:'烘焙工作室',status:'planning',priority:'high',items:['中岛','六人桌','咖啡柜'],modes:['恭迎'],notes:'客厅兼用，恭迎期间启动'},{id:103,name:'阳台花园',status:'planning',priority:'medium',items:['香草种植','花卉'],modes:['日常','恭迎'],notes:'可种香草供烘焙/料理使用'}]},{id:2,name:'公寓二 · 男生宿舍 + 咖啡工作室',colorIdx:1,unit:'1BG-505',layout:'3B 2B',zones:[{id:201,name:'男生宿舍',status:'confirmed',priority:'high',items:['日常住宿'],modes:['日常','恭迎'],notes:'恭迎期间兼供TJ姐/FQ姐使用'},{id:202,name:'咖啡工作室',status:'planning',priority:'high',items:['咖啡设备','咖啡柜'],modes:['日常'],notes:'内部小型互动空间'},{id:203,name:'内部学习复盘区',status:'planning',priority:'medium',items:['复盘学习','内部讨论'],modes:['恭迎'],notes:'恭迎期间用于内部复盘'},{id:204,name:'工作餐 · 素生活接待',status:'planning',priority:'medium',items:['内部工作餐','素生活体验','因缘小型接待'],modes:['日常','恭迎'],notes:'日常因缘接待 + 恭迎内部餐'}]},{id:3,name:'公寓三 · 素生活工作室',colorIdx:2,unit:'7LS-403',layout:'2B 2B · 可住4位',zones:[{id:301,name:'前贤 · 夫妻宿舍',status:'planning',priority:'high',items:['前贤住宿','夫妻房'],modes:['恭迎'],notes:'恭迎期间专用'},{id:302,name:'素生活餐厅',status:'confirmed',priority:'high',items:['12人大长桌（来自303）','两张六人桌'],modes:['日常','恭迎'],notes:'因缘接待晚餐 + 恭迎前贤接待晚餐'},{id:303,name:'沙龙研讨空间',status:'planning',priority:'high',items:['智慧屏','大长桌'],modes:['日常','恭迎'],notes:'日常学习互动 + 恭迎期间沙龙研讨'}]}]};
function load(){try{const d=JSON.parse(localStorage.getItem(SK));if(d&&d.apts)return d;}catch{}return JSON.parse(JSON.stringify(DEFAULT));}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}
let state=load(),mode='edit',editingZone=null,editing={},newTagVal={};
function genId(){return Date.now()+Math.floor(Math.random()*9999);}
function sL(s){return{confirmed:'已确认',planning:'规划中',pending:'待讨论',paused:'暂缓'}[s]||s;}
function sC(s){return{confirmed:'status-confirmed',planning:'status-planning',pending:'status-pending',paused:'status-paused'}[s]||'';}
function pL(p){return{high:'高',medium:'中',low:'低'}[p]||p;}
function pC(p){return{high:'priority-high',medium:'priority-medium',low:'priority-low'}[p]||'';}
function allZ(){return state.apts.flatMap(a=>a.zones);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mTag(m){if(m==='日常')return'<span class="mode-tag mode-daily">日常</span>';if(m==='恭迎')return'<span class="mode-tag mode-event">恭迎</span>';return'<span class="mode-tag" style="background:#f3f4f6;color:#555">'+esc(m)+'</span>';}
function iF(key,val,opts){const{style='',iw='120px',is='',ph='点击编辑'}=opts||{};if(editing[key])return'<input class="inline-input" id="ie-'+key+'" value="'+esc(val)+'" style="width:'+iw+';'+is+'" />';return'<span class="editable" id="ec-'+key+'" style="'+style+'" title="点击编辑">'+esc(val)+'</span>';}
function render(){save(state);document.getElementById('root').innerHTML=mode==='report'?rRep():rEdit();bind();}
function rTop(){
  const t=editing.title?'<input class="inline-input" id="ie-title" value="'+esc(state.title)+'" style="font-size:15px;font-weight:500;width:260px;" />':'<span class="editable" id="ec-title" style="font-size:15px;font-weight:500;">'+esc(state.title)+'</span>';
  const s=editing.subtitle?'<input class="inline-input" id="ie-subtitle" value="'+esc(state.subtitle)+'" style="font-size:12px;width:200px;" />':'<span class="editable" id="ec-subtitle" style="font-size:12px;color:#666;">'+esc(state.subtitle)+'</span>';
  return'<div class="topbar"><div style="display:flex;flex-direction:column;gap:3px;"><div style="display:flex;align-items:center;gap:6px;">'+t+'<span class="hint">点击可编辑</span></div><div>'+s+'</div></div><div>'+(mode==='edit'?'<button class="btn btn-primary" id="btn-rep">报告视图</button>':'<button class="btn btn-primary" id="btn-edit">编辑模式</button>')+'</div></div>';
}
function rEdit(){
  let h=rTop()+'<div class="apts">';
  state.apts.forEach(apt=>{
    const col=COLORS[apt.colorIdx%3];
    const nA=iF('an-'+apt.id,apt.name,{style:'font-size:14px;font-weight:500;',iw:'210px'});
    const uA=iF('au-'+apt.id,apt.unit,{style:'font-size:12px;color:#666;',iw:'200px'});
    const lA=iF('al-'+apt.id,apt.layout,{style:'font-size:12px;color:#666;',iw:'120px'});
    h+='<div class="apt-section"><div class="apt-header"><div class="apt-dot" style="background:'+col+'"></div><div class="apt-header-info"><div class="apt-name-line">'+nA+'</div><div class="apt-meta-line">'+uA+' · '+lA+' · '+apt.zones.length+' 个分区</div></div></div><div class="apt-body">'+
    apt.zones.map(z=>'<div class="zone-card'+(editingZone===z.id?' active':'')+'" data-zid="'+z.id+'"><div class="zone-card-header"><span class="zone-name">'+esc(z.name)+'</span><span class="zone-status '+sC(z.status)+'">'+sL(z.status)+'</span></div>'+((z.modes||[]).length?'<div class="zone-mode-row">'+z.modes.map(mTag).join('')+'</div>':'')+(z.items.length?'<div class="zone-items">'+z.items.slice(0,3).map(i=>'<span class="zone-tag">'+esc(i)+'</span>').join('')+(z.items.length>3?'<span class="zone-tag">+'+(z.items.length-3)+'</span>':'')+'</div>':'')+(z.notes?'<div class="zone-notes">'+esc(z.notes.substring(0,45))+(z.notes.length>45?'…':'')+'</div>':'')+'</div>').join('')+
    '<button class="add-zone-btn" id="az-'+apt.id+'">+ 添加分区</button></div></div>';
  });
  h+='</div>';
  if(editingZone){const z=allZ().find(x=>x.id===editingZone);if(z)h+=rModal(z);}
  return h;
}
function rModal(z){
  return'<div class="modal-wrap" id="mo"><div class="modal"><h3>编辑分区</h3><div class="field"><label>分区名称</label><input id="zn" value="'+esc(z.name)+'" /></div><div class="field"><label>所属公寓</label><select id="za">'+state.apts.map(a=>'<option value="'+a.id+'"'+(a.zones.find(x=>x.id===z.id)?' selected':'')+'>'+esc(a.name)+'</option>').join('')+'</select></div><div class="field"><label>状态</label><select id="zs">'+['confirmed','planning','pending','paused'].map(s=>'<option value="'+s+'"'+(z.status===s?' selected':'')+'>'+sL(s)+'</option>').join('')+'</select></div><div class="field"><label>优先级</label><select id="zp">'+['high','medium','low'].map(p=>'<option value="'+p+'"'+(z.priority===p?' selected':'')+'>'+pL(p)+'</option>').join('')+'</select></div><div class="field"><label>适用模式（顿号隔开）</label><input id="zm" value="'+esc((z.modes||[]).join('、'))+'" placeholder="日常、恭迎" /></div><div class="field"><label>功能 / 物品</label><div class="tags-row" id="td">'+z.items.map((item,i)=>'<span class="tag-chip">'+esc(item)+'<span class="tag-remove" data-ti="'+i+'">×</span></span>').join('')+'</div><div class="add-tag-row"><input id="ti" placeholder="输入后回车…" value="'+esc(newTagVal[z.id]||'')+'" /><button class="btn" id="ta">添加</button></div></div><div class="field"><label>备注</label><textarea id="znt">'+esc(z.notes||'')+'</textarea></div><div class="modal-actions"><button class="btn btn-danger" id="zd">删除</button><button class="btn" id="mc">取消</button><button class="btn btn-primary" id="ms">保存</button></div></div></div>';
}
function rRep(){
  const total=allZ().length,conf=allZ().filter(z=>z.status==='confirmed').length,plan=allZ().filter(z=>z.status==='planning').length;
  let h=rTop()+'<div style="margin-bottom:1.25rem;"><div>'+iF('subtitle',state.subtitle,{style:'font-size:13px;color:#666;',iw:'220px'})+' <span style="font-size:12px;color:#aaa;">· 更新于 '+state.updatedAt+'</span></div></div>';
  h+='<div class="stats-row"><div class="stat-card"><div class="num">'+total+'</div><div class="lbl">功能分区</div></div><div class="stat-card"><div class="num" style="color:#166534">'+conf+'</div><div class="lbl">已确认</div></div><div class="stat-card"><div class="num" style="color:#854d0e">'+plan+'</div><div class="lbl">规划中</div></div></div>';
  state.apts.forEach(apt=>{
    if(!apt.zones.length)return;
    const col=COLORS[apt.colorIdx%3],lb=apt.colorIdx===0?'#EEEDFE':apt.colorIdx===1?'#E1F5EE':'#FAECE7',tc=apt.colorIdx===0?'#3C3489':apt.colorIdx===1?'#085041':'#712B13';
    const nA=iF('an-'+apt.id,apt.name,{iw:'220px',is:'color:'+tc+';font-weight:500;',style:'color:'+tc+';font-weight:500;'});
    const uA=iF('au-'+apt.id,apt.unit,{iw:'180px',is:'color:'+tc+';',style:'color:'+tc+';opacity:0.85;'});
    const lA=iF('al-'+apt.id,apt.layout,{iw:'100px',is:'color:'+tc+';',style:'color:'+tc+';opacity:0.85;'});
    h+='<div class="report-apt"><div class="report-apt-header" style="background:'+lb+';"><div style="font-size:14px;margin-bottom:3px;display:flex;align-items:center;gap:6px;"><div style="width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0;"></div>'+nA+'</div><div style="font-size:12px;margin-left:14px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;">'+uA+' <span style="color:'+tc+';opacity:0.5;">·</span> '+lA+'</div></div>'+
    apt.zones.map(z=>'<div class="report-zone"><div class="report-zone-top"><span class="report-zone-name">'+esc(z.name)+'</span><div style="display:flex;gap:6px;align-items:center;"><span class="'+pC(z.priority)+'" style="font-size:11px;">'+pL(z.priority)+'优先</span><span class="zone-status '+sC(z.status)+'">'+sL(z.status)+'</span></div></div>'+((z.modes||[]).length?'<div class="report-mode-row">'+z.modes.map(mTag).join('')+'</div>':'')+(z.items.length?'<div class="report-tags">'+z.items.map(i=>'<span class="report-tag">'+esc(i)+'</span>').join('')+'</div>':'')+(z.notes?'<div class="report-notes">'+esc(z.notes)+'</div>':'')+'</div>').join('')+'</div>';
  });
  return h;
}
function sE(key){editing[key]=true;render();setTimeout(()=>{const el=document.getElementById('ie-'+key);if(el){el.focus();el.select();}},0);}
function cE(key,val,fn){fn(val);delete editing[key];state.updatedAt=new Date().toLocaleDateString('zh-CN');render();}
function bI(key,fn){
  document.getElementById('ec-'+key)?.addEventListener('click',()=>sE(key));
  const i=document.getElementById('ie-'+key);
  if(i){i.addEventListener('blur',()=>cE(key,i.value.trim()||i.value,fn));i.addEventListener('keydown',e=>{if(e.key==='Enter')i.blur();if(e.key==='Escape'){delete editing[key];render();}});}
}
function bind(){
  document.getElementById('btn-rep')?.addEventListener('click',()=>{mode='report';render();});
  document.getElementById('btn-edit')?.addEventListener('click',()=>{mode='edit';render();});
  bI('title',v=>state.title=v);bI('subtitle',v=>state.subtitle=v);
  state.apts.forEach(apt=>{
    bI('an-'+apt.id,v=>apt.name=v);bI('au-'+apt.id,v=>apt.unit=v);bI('al-'+apt.id,v=>apt.layout=v);
    document.getElementById('az-'+apt.id)?.addEventListener('click',()=>{const nz={id:genId(),name:'新分区',status:'planning',priority:'medium',items:[],modes:[],notes:''};apt.zones.push(nz);editingZone=nz.id;render();});
    apt.zones.forEach(z=>{document.querySelector('[data-zid="'+z.id+'"]')?.addEventListener('click',()=>{editingZone=z.id;render();});});
  });
  if(editingZone){
    const z=allZ().find(x=>x.id===editingZone);
    if(z){
      document.getElementById('mo')?.addEventListener('click',e=>{if(e.target.id==='mo'){editingZone=null;render();}});
      document.getElementById('mc')?.addEventListener('click',()=>{editingZone=null;render();});
      document.getElementById('ms')?.addEventListener('click',()=>{
        const name=document.getElementById('zn')?.value.trim(),status=document.getElementById('zs')?.value,priority=document.getElementById('zp')?.value,notes=document.getElementById('znt')?.value,aptId=parseInt(document.getElementById('za')?.value),modes=(document.getElementById('zm')?.value||'').split(/[、,，\s]+/).map(m=>m.trim()).filter(Boolean);
        if(name)z.name=name;z.status=status;z.priority=priority;z.notes=notes;z.modes=modes;
        if(aptId){const ca=state.apts.find(a=>a.zones.find(x=>x.id===z.id)),ta=state.apts.find(a=>a.id===aptId);if(ca&&ta&&ca.id!==ta.id){ca.zones=ca.zones.filter(x=>x.id!==z.id);ta.zones.push(z);}}
        editingZone=null;render();
      });
      document.getElementById('zd')?.addEventListener('click',()=>{state.apts.forEach(a=>{a.zones=a.zones.filter(x=>x.id!==z.id);});editingZone=null;render();});
      document.querySelectorAll('.tag-remove').forEach(btn=>{btn.onclick=()=>{z.items.splice(parseInt(btn.dataset.ti),1);render();};});
      const tI=document.getElementById('ti');
      const aT=()=>{const v=tI?.value.trim();if(v&&!z.items.includes(v)){z.items.push(v);newTagVal[z.id]='';render();}};
      document.getElementById('ta')?.addEventListener('click',aT);
      tI?.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();aT();}});
      if(tI)tI.oninput=e=>{newTagVal[z.id]=e.target.value;};
    }
  }
}
render();
</script>
</body>
</html>
