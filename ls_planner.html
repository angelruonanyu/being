
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary);}
.app{padding:1rem 0;}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:8px;flex-wrap:wrap;}
.btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--color-text-primary);transition:background 0.15s;}
.btn:hover{background:var(--color-background-secondary);}
.btn-primary{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);}
.btn-primary:hover{opacity:0.85;}
.editable{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s;}
.editable:hover{border-bottom-color:var(--color-border-secondary);}
.inline-input{background:none;border:none;border-bottom:1px solid var(--color-border-secondary);outline:none;color:inherit;font:inherit;padding:0 2px;}
.apts{display:flex;flex-direction:column;gap:1.5rem;}
.apt-section{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;}
.apt-header{padding:12px 14px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:flex-start;gap:10px;}
.apt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.apt-header-info{flex:1;min-width:0;}
.apt-name-line{font-size:14px;font-weight:500;margin-bottom:3px;}
.apt-meta-line{font-size:12px;color:var(--color-text-secondary);display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.apt-body{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.zone-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;background:var(--color-background-primary);cursor:pointer;transition:border-color 0.15s;}
.zone-card:hover{border-color:var(--color-border-primary);}
.zone-card.active{border-color:var(--color-border-info);border-width:1px;}
.zone-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.zone-name{font-size:13px;font-weight:500;}
.zone-status{font-size:11px;padding:2px 7px;border-radius:20px;}
.status-confirmed{background:var(--color-background-success);color:var(--color-text-success);}
.status-planning{background:var(--color-background-warning);color:var(--color-text-warning);}
.status-pending{background:var(--color-background-info);color:var(--color-text-info);}
.status-paused{background:var(--color-background-secondary);color:var(--color-text-secondary);}
.zone-items{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.zone-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);}
.zone-mode-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.mode-tag{font-size:10px;padding:1px 6px;border-radius:20px;}
.mode-daily{background:#E1F5EE;color:#0F6E56;}
.mode-event{background:#FAEEDA;color:#854F0B;}
.zone-notes{font-size:11px;color:var(--color-text-tertiary);font-style:italic;}
.add-zone-btn{border:1px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:12px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--color-text-secondary);cursor:pointer;min-height:80px;background:none;width:100%;transition:border-color 0.15s,color 0.15s;}
.add-zone-btn:hover{border-color:var(--color-border-info);color:var(--color-text-info);}
.modal h3{font-size:14px;font-weight:500;margin-bottom:1rem;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;}
.field input,.field select,.field textarea{width:100%;padding:6px 9px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans);}
.field textarea{resize:vertical;min-height:54px;}
.tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.tag-chip{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);display:flex;align-items:center;gap:3px;}
.tag-remove{cursor:pointer;color:var(--color-text-tertiary);font-size:13px;line-height:1;}
.tag-remove:hover{color:var(--color-text-danger);}
.add-tag-row{display:flex;gap:6px;}
.add-tag-row input{flex:1;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;border-top:0.5px solid var(--color-border-tertiary);padding-top:11px;}
.btn-danger{color:var(--color-text-danger);border-color:var(--color-border-danger);}
.btn-danger:hover{background:var(--color-background-danger);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;}
.stat-card .num{font-size:24px;font-weight:500;}
.stat-card .lbl{font-size:12px;color:var(--color-text-secondary);margin-top:2px;}
.report-apt{margin-bottom:1.75rem;}
.report-apt-header{padding:10px 14px;border-radius:var(--border-radius-md);margin-bottom:10px;}
.report-zone{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:8px;background:var(--color-background-primary);}
.report-zone-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.report-zone-name{font-size:13px;font-weight:500;}
.report-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.report-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);}
.report-notes{font-size:12px;color:var(--color-text-secondary);font-style:italic;margin-top:7px;padding-top:7px;border-top:0.5px solid var(--color-border-tertiary);}
.report-mode-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.priority-high{color:#E24B4A;}.priority-medium{color:#BA7517;}.priority-low{color:#3B6D11;}
.hint{font-size:11px;color:var(--color-text-tertiary);margin-left:6px;}
</style>

<div class="app" id="root"></div>

<script>
const SK='lillie-sq-v4';
const COLORS=['#7F77DD','#1D9E75','#D85A30'];
const DEFAULT={title:'Lillie Square 工作室功能分区规划',subtitle:'三套公寓 · Earls Court / Kensington',updatedAt:new Date().toLocaleDateString('zh-CN'),apts:[{id:1,name:'公寓一 · 女生宿舍 + 烘焙工作室',colorIdx:0,unit:'7LS-303（备选 2BG-G04，5月初搬家）',layout:'2.5B 2B · 可住6位',zones:[{id:101,name:'女生宿舍',status:'confirmed',priority:'high',items:['双人床×2','上下床×1','可住6位'],modes:['日常','恭迎'],notes:'两个沙发可午休'},{id:102,name:'烘焙工作室',status:'planning',priority:'high',items:['中岛','六人桌','咖啡柜'],modes:['恭迎'],notes:'客厅兼用，恭迎期间启动'},{id:103,name:'阳台花园',status:'planning',priority:'medium',items:['香草种植','花卉'],modes:['日常','恭迎'],notes:'可种香草供烘焙/料理使用'}]},{id:2,name:'公寓二 · 男生宿舍 + 咖啡工作室',colorIdx:1,unit:'1BG-505',layout:'3B 2B',zones:[{id:201,name:'男生宿舍',status:'confirmed',priority:'high',items:['日常住宿'],modes:['日常','恭迎'],notes:'恭迎期间兼供TJ姐/FQ姐使用'},{id:202,name:'咖啡工作室',status:'planning',priority:'high',items:['咖啡设备','咖啡柜'],modes:['日常'],notes:'内部小型互动空间'},{id:203,name:'内部学习复盘区',status:'planning',priority:'medium',items:['复盘学习','内部讨论'],modes:['恭迎'],notes:'恭迎期间用于内部复盘'},{id:204,name:'工作餐 · 素生活接待',status:'planning',priority:'medium',items:['内部工作餐','素生活体验','因缘小型接待'],modes:['日常','恭迎'],notes:'日常因缘接待 + 恭迎内部餐'}]},{id:3,name:'公寓三 · 素生活工作室',colorIdx:2,unit:'7LS-403',layout:'2B 2B · 可住4位',zones:[{id:301,name:'前贤 · 夫妻宿舍',status:'planning',priority:'high',items:['前贤住宿','夫妻房'],modes:['恭迎'],notes:'恭迎期间专用'},{id:302,name:'素生活餐厅',status:'confirmed',priority:'high',items:['12人大长桌（来自303）','两张六人桌'],modes:['日常','恭迎'],notes:'因缘接待晚餐 + 恭迎前贤接待晚餐'},{id:303,name:'沙龙研讨空间',status:'planning',priority:'high',items:['智慧屏','大长桌'],modes:['日常','恭迎'],notes:'日常学习互动 + 恭迎期间沙龙研讨'}]}]};

function load(){try{const d=JSON.parse(localStorage.getItem(SK));if(d&&d.apts)return d;}catch{}return JSON.parse(JSON.stringify(DEFAULT));}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}
let state=load(),mode='edit',editingZone=null,editing={},newTagVal={};
function genId(){return Date.now()+Math.floor(Math.random()*9999);}
function sLabel(s){return{confirmed:'已确认',planning:'规划中',pending:'待讨论',paused:'暂缓'}[s]||s;}
function sClass(s){return{confirmed:'status-confirmed',planning:'status-planning',pending:'status-pending',paused:'status-paused'}[s]||'';}
function pLabel(p){return{high:'高',medium:'中',low:'低'}[p]||p;}
function pClass(p){return{high:'priority-high',medium:'priority-medium',low:'priority-low'}[p]||'';}
function allZ(){return state.apts.flatMap(a=>a.zones);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mTag(m){if(m==='日常')return'<span class="mode-tag mode-daily">日常</span>';if(m==='恭迎')return'<span class="mode-tag mode-event">恭迎</span>';return'<span class="mode-tag" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">'+esc(m)+'</span>';}
function iF(key,val,opts){const{style='',placeholder='点击编辑',iw='120px',is=''}=opts||{};if(editing[key])return'<input class="inline-input" id="ie-'+key+'" value="'+esc(val)+'" placeholder="'+esc(placeholder)+'" style="width:'+iw+';'+is+'" />';return'<span class="editable" id="ec-'+key+'" style="'+style+'" title="点击编辑">'+esc(val)+'</span>';}

function render(){save(state);document.getElementById('root').innerHTML=mode==='report'?rReport():rEdit();bind();}

function rTopbar(){
  const t=editing['title']?'<input class="inline-input" id="ie-title" value="'+esc(state.title)+'" style="font-size:15px;font-weight:500;width:260px;" />':'<span class="editable" id="ec-title" style="font-size:15px;font-weight:500;">'+esc(state.title)+'</span>';
  const s=editing['subtitle']?'<input class="inline-input" id="ie-subtitle" value="'+esc(state.subtitle)+'" style="font-size:12px;width:200px;" />':'<span class="editable" id="ec-subtitle" style="font-size:12px;color:var(--color-text-secondary);">'+esc(state.subtitle)+'</span>';
  return'<div class="topbar"><div style="display:flex;flex-direction:column;gap:3px;"><div style="display:flex;align-items:center;gap:6px;">'+t+'<span class="hint">点击可编辑</span></div><div>'+s+'</div></div><div style="display:flex;gap:6px;">'+(mode==='edit'?'<button class="btn btn-primary" id="btn-report">报告视图</button>':'<button class="btn btn-primary" id="btn-edit">编辑模式</button>')+'</div></div>';
}

function rEdit(){
  let h=rTopbar()+'<div class="apts">';
  state.apts.forEach(apt=>{
    const c=COLORS[apt.colorIdx%COLORS.length];
    const uA=iF('apt-unit-'+apt.id,apt.unit,{placeholder:'单元号',iw:'200px',style:'font-size:12px;color:var(--color-text-secondary);'});
    const lA=iF('apt-layout-'+apt.id,apt.layout,{placeholder:'房型',iw:'120px',style:'font-size:12px;color:var(--color-text-secondary);'});
    const nA=iF('apt-name-'+apt.id,apt.name,{placeholder:'公寓名称',iw:'200px',style:'font-size:14px;font-weight:500;'});
    h+='<div class="apt-section"><div class="apt-header"><div class="apt-dot" style="background:'+c+'"></div><div class="apt-header-info"><div class="apt-name-line">'+nA+'</div><div class="apt-meta-line">'+uA+' · '+lA+' · '+apt.zones.length+' 个分区</div></div></div><div class="apt-body">'+
    apt.zones.map(z=>'<div class="zone-card'+(editingZone===z.id?' active':'')+'" data-zid="'+z.id+'"><div class="zone-card-header"><span class="zone-name">'+esc(z.name)+'</span><span class="zone-status '+sClass(z.status)+'">'+sLabel(z.status)+'</span></div>'+((z.modes||[]).length?'<div class="zone-mode-row">'+z.modes.map(mTag).join('')+'</div>':'')+(z.items.length?'<div class="zone-items">'+z.items.slice(0,3).map(i=>'<span class="zone-tag">'+esc(i)+'</span>').join('')+(z.items.length>3?'<span class="zone-tag">+'+(z.items.length-3)+'</span>':'')+'</div>':'')+(z.notes?'<div class="zone-notes">'+esc(z.notes.substring(0,45))+(z.notes.length>45?'…':'')+'</div>':'')+'</div>').join('')+
    '<button class="add-zone-btn" id="add-zone-'+apt.id+'">+ 添加分区</button></div></div>';
  });
  h+='</div>';
  if(editingZone){const z=allZ().find(x=>x.id===editingZone);if(z)h+=rModal(z);}
  return h;
}

function rModal(z){
  return'<div style="position:fixed;inset:0;background:rgba(0,0,0,0.22);display:flex;align-items:flex-start;justify-content:center;padding-top:30px;z-index:100;" id="modal-overlay"><div class="modal" style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;width:360px;max-width:95vw;max-height:80vh;overflow-y:auto;"><h3>编辑分区</h3><div class="field"><label>分区名称</label><input id="z-name" value="'+esc(z.name)+'" /></div><div class="field"><label>所属公寓</label><select id="z-apt">'+state.apts.map(a=>'<option value="'+a.id+'"'+(a.zones.find(x=>x.id===z.id)?' selected':'')+'>'+esc(a.name)+'</option>').join('')+'</select></div><div class="field"><label>状态</label><select id="z-status">'+['confirmed','planning','pending','paused'].map(s=>'<option value="'+s+'"'+(z.status===s?' selected':'')+'>'+sLabel(s)+'</option>').join('')+'</select></div><div class="field"><label>优先级</label><select id="z-priority">'+['high','medium','low'].map(p=>'<option value="'+p+'"'+(z.priority===p?' selected':'')+'>'+pLabel(p)+'</option>').join('')+'</select></div><div class="field"><label>适用模式（顿号隔开）</label><input id="z-modes" value="'+esc((z.modes||[]).join('、'))+'" placeholder="日常、恭迎" /></div><div class="field"><label>功能 / 物品</label><div class="tags-row" id="tags-display">'+z.items.map((item,i)=>'<span class="tag-chip">'+esc(item)+'<span class="tag-remove" data-ti="'+i+'">×</span></span>').join('')+'</div><div class="add-tag-row"><input id="tag-input" placeholder="输入后回车…" value="'+esc(newTagVal[z.id]||'')+'" /><button class="btn" id="tag-add-btn">添加</button></div></div><div class="field"><label>备注</label><textarea id="z-notes">'+esc(z.notes||'')+'</textarea></div><div class="modal-actions"><button class="btn btn-danger" id="zone-del">删除</button><button class="btn" id="modal-cancel">取消</button><button class="btn btn-primary" id="modal-save">保存</button></div></div></div>';
}

function rReport(){
  const total=allZ().length,conf=allZ().filter(z=>z.status==='confirmed').length,plan=allZ().filter(z=>z.status==='planning').length;
  let h=rTopbar();
  h+='<div style="margin-bottom:1.25rem;"><div>'+iF('subtitle',state.subtitle,{placeholder:'副标题',iw:'220px',style:'font-size:13px;color:var(--color-text-secondary);'})+' <span style="font-size:12px;color:var(--color-text-tertiary);">· 更新于 '+state.updatedAt+'</span></div></div>';
  h+='<div class="stats-row"><div class="stat-card"><div class="num">'+total+'</div><div class="lbl">功能分区</div></div><div class="stat-card"><div class="num" style="color:var(--color-text-success)">'+conf+'</div><div class="lbl">已确认</div></div><div class="stat-card"><div class="num" style="color:var(--color-text-warning)">'+plan+'</div><div class="lbl">规划中</div></div></div>';
  state.apts.forEach(apt=>{
    if(!apt.zones.length)return;
    const c=COLORS[apt.colorIdx%COLORS.length],lb=apt.colorIdx===0?'#EEEDFE':apt.colorIdx===1?'#E1F5EE':'#FAECE7',tc=apt.colorIdx===0?'#3C3489':apt.colorIdx===1?'#085041':'#712B13';
    const nA=iF('apt-name-'+apt.id,apt.name,{iw:'220px',is:'color:'+tc+';font-weight:500;',style:'color:'+tc+';font-weight:500;'});
    const uA=iF('apt-unit-'+apt.id,apt.unit,{iw:'180px',is:'color:'+tc+';',style:'color:'+tc+';opacity:0.85;'});
    const lA=iF('apt-layout-'+apt.id,apt.layout,{iw:'100px',is:'color:'+tc+';',style:'color:'+tc+';opacity:0.85;'});
    h+='<div class="report-apt"><div class="report-apt-header" style="background:'+lb+';"><div style="font-size:14px;margin-bottom:3px;display:flex;align-items:center;gap:6px;"><div style="width:8px;height:8px;border-radius:50%;background:'+c+';flex-shrink:0;"></div>'+nA+'</div><div style="font-size:12px;margin-left:14px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;">'+uA+' <span style="color:'+tc+';opacity:0.5;">·</span> '+lA+'</div></div>'+
    apt.zones.map(z=>'<div class="report-zone"><div class="report-zone-top"><span class="report-zone-name">'+esc(z.name)+'</span><div style="display:flex;gap:6px;align-items:center;"><span class="'+pClass(z.priority)+'" style="font-size:11px;">'+pLabel(z.priority)+'优先</span><span class="zone-status '+sClass(z.status)+'">'+sLabel(z.status)+'</span></div></div>'+((z.modes||[]).length?'<div class="report-mode-row">'+z.modes.map(mTag).join('')+'</div>':'')+(z.items.length?'<div class="report-tags">'+z.items.map(i=>'<span class="report-tag">'+esc(i)+'</span>').join('')+'</div>':'')+(z.notes?'<div class="report-notes">'+esc(z.notes)+'</div>':'')+'</div>').join('')+'</div>';
  });
  return h;
}

function sE(key){editing[key]=true;render();setTimeout(()=>{const el=document.getElementById('ie-'+key);if(el){el.focus();el.select();}},0);}
function cE(key,val,fn){fn(val);delete editing[key];state.updatedAt=new Date().toLocaleDateString('zh-CN');render();}
function bI(key,fn){
  document.getElementById('ec-'+key)?.addEventListener('click',()=>sE(key));
  const i=document.getElementById('ie-'+key);
  if(i){i.addEventListener('blur',()=>cE(key,i.value.trim()||i.value,fn));i.addEventListener('keydown',e=>{if(e.key==='Enter')i.blur();if(e.key==='Escape'){delete editing[key];render();}});}
}

function bind(){
  document.getElementById('btn-report')?.addEventListener('click',()=>{mode='report';render();});
  document.getElementById('btn-edit')?.addEventListener('click',()=>{mode='edit';render();});
  bI('title',v=>state.title=v);
  bI('subtitle',v=>state.subtitle=v);
  state.apts.forEach(apt=>{
    bI('apt-name-'+apt.id,v=>apt.name=v);
    bI('apt-unit-'+apt.id,v=>apt.unit=v);
    bI('apt-layout-'+apt.id,v=>apt.layout=v);
    document.getElementById('add-zone-'+apt.id)?.addEventListener('click',()=>{
      const nz={id:genId(),name:'新分区',status:'planning',priority:'medium',items:[],modes:[],notes:''};
      apt.zones.push(nz);editingZone=nz.id;render();
    });
    apt.zones.forEach(z=>{
      document.querySelector('[data-zid="'+z.id+'"]')?.addEventListener('click',()=>{editingZone=z.id;render();});
    });
  });
  if(editingZone){
    const z=allZ().find(x=>x.id===editingZone);
    if(z){
      document.getElementById('modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='modal-overlay'){editingZone=null;render();}});
      document.getElementById('modal-cancel')?.addEventListener('click',()=>{editingZone=null;render();});
      document.getElementById('modal-save')?.addEventListener('click',()=>{
        const name=document.getElementById('z-name')?.value.trim(),status=document.getElementById('z-status')?.value,priority=document.getElementById('z-priority')?.value,notes=document.getElementById('z-notes')?.value,aptId=parseInt(document.getElementById('z-apt')?.value),modes=(document.getElementById('z-modes')?.value||'').split(/[、,，\s]+/).map(m=>m.trim()).filter(Boolean);
        if(name)z.name=name;z.status=status;z.priority=priority;z.notes=notes;z.modes=modes;
        if(aptId){const ca=state.apts.find(a=>a.zones.find(x=>x.id===z.id)),ta=state.apts.find(a=>a.id===aptId);if(ca&&ta&&ca.id!==ta.id){ca.zones=ca.zones.filter(x=>x.id!==z.id);ta.zones.push(z);}}
        editingZone=null;render();
      });
      document.getElementById('zone-del')?.addEventListener('click',()=>{state.apts.forEach(a=>{a.zones=a.zones.filter(x=>x.id!==z.id);});editingZone=null;render();});
      document.querySelectorAll('.tag-remove').forEach(btn=>{btn.onclick=()=>{z.items.splice(parseInt(btn.dataset.ti),1);render();};});
      const tI=document.getElementById('tag-input');
      const aT=()=>{const v=tI?.value.trim();if(v&&!z.items.includes(v)){z.items.push(v);newTagVal[z.id]='';render();}};
      document.getElementById('tag-add-btn')?.addEventListener('click',aT);
      tI?.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();aT();}});
      if(tI)tI.oninput=e=>{newTagVal[z.id]=e.target.value;};
    }
  }
}
render();
</script>
